name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-ankita:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/flask-ankita:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/flask-ankita:latest

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-ankita:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-ankita:latest


  deploy:

    needs: build
    runs-on: self-hosted   # IMPORTANT

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yml
        kubectl rollout status deployment/flask-ankita-deployment -n cse-pmoe-hcm


