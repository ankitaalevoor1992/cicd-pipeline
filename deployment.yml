apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-ankita-deployment
  namespace: cse-pmoe-hcm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-api-app
  template:
    metadata:
      labels:
        app: flask-api-app
    spec:
      containers:
      - name: flask-container
        image: flask-ankita:v1  
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
