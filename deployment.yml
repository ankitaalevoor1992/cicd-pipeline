apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-ankita-deployment
  namespace: cse-pmoe-hcm
  labels:
    app: flask-api-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-api-app

  template:
    metadata:
      labels:
        app: flask-api-app

    spec:
      containers:
        - name: flask-container
          image: ankitaalevoor/flask-ankita:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          # Health checks (VERY important for CD + self-healing)
          livenessProbe:
            httpGet:
              path: /uptime
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /uptime
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

